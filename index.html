<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lagy.pw</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;700&display=swap');
        :root {
            --bg-dark: #070707;
            --glass-surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        body {
            background-color: var(--bg-dark);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        model-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            --poster-color: transparent;
            background-color: var(--bg-dark);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }
        model-viewer.is-loaded {
            opacity: 1;
        }
        .font-heading { font-family: 'Space Grotesk', sans-serif; }
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(7, 7, 7, 0.8) 100%);
        }
        .glass-card {
            background: var(--glass-surface);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            /* Only transition background and border — NOT transform (JS physics handles that) */
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            /* Springy needs these */
            transform-origin: center center;
            will-change: transform;
            cursor: pointer;
            touch-action: none;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            /* Removed CSS transform hover — JS physics replaces it */
            box-shadow: 0 15px 45px rgba(255, 255, 255, 0.05);
        }
        .chrome-title {
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.2; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            padding-bottom: 0.1em;
        }
        .icon-glow {
            transition: all 0.4s ease;
            color: #ffffff !important;
            opacity: 0.7;
            font-size: 2.5rem;
            pointer-events: none;
        }
        .glass-card:hover .icon-glow {
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.6));
        }
        .animate-fade {
            animation: fadeIn 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <model-viewer 
        id="mouse-model"
        src="g305.glb" 
        alt="G305 Mouse"
        interaction-prompt="none"
        camera-orbit="0deg 75deg 105%"
        field-of-view="30deg"
        shadow-intensity="2" 
        exposure="1.2"
        loading="eager">
    </model-viewer>
    <div class="glass-overlay"></div>
    <main class="flex-1 flex flex-col items-center justify-center pt-24 px-6 max-w-4xl mx-auto w-full relative z-10">
        <header class="text-center mb-12 animate-fade">
            <h1 class="text-7xl md:text-9xl font-heading chrome-title">zylorey</h1>
        </header>
        <div class="w-full grid grid-cols-2 sm:grid-cols-4 gap-8 animate-fade" style="animation-delay: 0.2s;">
            <a href="/calculator/" class="glass-card group">
                <i class="fa-solid fa-calculator icon-glow"></i>
            </a>
            <a href="https://github.com/zylorey" target="_blank" class="glass-card group">
                <i class="fa-brands fa-github icon-glow"></i>
            </a>
            <a href="https://steamcommunity.com/id/teroris/" target="_blank" class="glass-card group">
                <i class="fa-brands fa-steam icon-glow"></i>
            </a>
            <a href="" target="_blank" class="glass-card group">
                <i class="fa-solid fa-link icon-glow"></i>
            </a>
        </div>
    </main>
    <footer class="py-12 text-center opacity-30 hover:opacity-100 transition-all animate-fade relative z-10" style="animation-delay: 0.4s;">
        <p class="text-[10px] uppercase tracking-[1em]">ㅤ</p>
    </footer>
    <script>
        /* ─── Model Viewer Setup ─────────────────────────────────────────── */
        const modelViewer = document.querySelector('#mouse-model');

        modelViewer.addEventListener('load', () => {
            modelViewer.classList.add('is-loaded');
            modelViewer.pause();
            modelViewer.currentTime = 0;
        });

        let pressSide = null;
        let pressCheckId = null;
        let pressDeferId = null;

        window.addEventListener('mousedown', (e) => {
            let side = null;
            if (e.button === 0) side = 'left';
            else if (e.button === 2) side = 'right';
            if (!side || !modelViewer.availableAnimations.includes(side)) return;

            if (pressDeferId) cancelAnimationFrame(pressDeferId);
            if (pressCheckId) cancelAnimationFrame(pressCheckId);
            pressSide = side;
            pressCheckId = null;
            pressDeferId = null;

            modelViewer.pause();
            modelViewer.currentTime = 0;
            modelViewer.animationName = side;

            pressDeferId = requestAnimationFrame(() => {
                if (pressSide !== side) return;
                pressDeferId = null;
                modelViewer.play({ repetitions: 1 });

                (function checkDown() {
                    if (modelViewer.currentTime >= 0.08) {
                        modelViewer.pause();
                        pressCheckId = null;
                        return;
                    }
                    pressCheckId = requestAnimationFrame(checkDown);
                })();
            });
        });

        window.addEventListener('mouseup', () => {
            if (!pressSide) return;

            if (pressDeferId) {
                cancelAnimationFrame(pressDeferId);
                pressDeferId = null;
            }
            if (pressCheckId) {
                cancelAnimationFrame(pressCheckId);
                pressCheckId = null;
            }

            if (modelViewer.currentTime < 0.08) {
                modelViewer.currentTime = 0.08;
            }

            modelViewer.play({ repetitions: 1 });

            (function checkUp() {
                if (modelViewer.currentTime >= 0.13) {
                    modelViewer.pause();
                    modelViewer.currentTime = 0;
                    pressSide = null;
                    return;
                }
                pressCheckId = requestAnimationFrame(checkUp);
            })();
        });

        window.addEventListener('contextmenu', (e) => e.preventDefault());

        modelViewer.addEventListener('finished', () => {
            if (pressDeferId) {
                cancelAnimationFrame(pressDeferId);
                pressDeferId = null;
            }
            if (pressCheckId) {
                cancelAnimationFrame(pressCheckId);
                pressCheckId = null;
            }
            modelViewer.pause();
            modelViewer.currentTime = 0;
            pressSide = null;
        });

        /* ─── Springy Physics ────────────────────────────────────────────── */
        const PHYSICS = {
            stiffness:      0.010,
            damping:        0.950,
            scaleBounce:    0.025,
            dragResistance: 0.350,
            squishSize:     0.760,
            squishSpeed:    0.150
        };

        const cardStates = new Map();

        document.querySelectorAll('.glass-card').forEach(card => {

            /* Existing radial-gradient hover effect */
            card.addEventListener('mousemove', (e) => {
                if (cardStates.get(card).isDragging) return; // skip while dragging
                const rect = card.getBoundingClientRect();
                card.style.background = `radial-gradient(circle at ${e.clientX - rect.left}px ${e.clientY - rect.top}px, rgba(255,255,255,0.15) 0%, rgba(255, 255, 255, 0.05) 70%)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.background = `rgba(255, 255, 255, 0.05)`;
            });

            /* Per-card physics state */
            const state = {
                isDragging: false,
                startX: 0, startY: 0,
                tx: 0,    ty: 0,
                vx: 0,    vy: 0,
                scale: 1, scaleV: 0,
                lastX: 0, lastY: 0,
                prevX: 0, prevY: 0,
                raf: null,
                phase: 'idle'
            };
            cardStates.set(card, state);

            function applyTransform() {
                card.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.scale})`;
            }

            function squishLoop() {
                state.scale += (PHYSICS.squishSize - state.scale) * PHYSICS.squishSpeed;
                applyTransform();
                if (Math.abs(state.scale - PHYSICS.squishSize) > 0.001 && state.phase === 'squish') {
                    state.raf = requestAnimationFrame(squishLoop);
                }
            }

            function bounceLoop() {
                const ax = -state.tx * PHYSICS.stiffness;
                const ay = -state.ty * PHYSICS.stiffness;
                state.vx = state.vx * PHYSICS.damping + ax;
                state.vy = state.vy * PHYSICS.damping + ay;
                state.tx += state.vx;
                state.ty += state.vy;

                const scaleForce = (1 - state.scale) * PHYSICS.scaleBounce;
                state.scaleV = state.scaleV * (PHYSICS.damping * 0.97) + scaleForce;
                state.scale += state.scaleV;

                applyTransform();

                const settled =
                    Math.abs(state.tx) <= 0.08 && Math.abs(state.ty) <= 0.08 &&
                    Math.abs(state.vx) <= 0.02 && Math.abs(state.vy) <= 0.02 &&
                    Math.abs(state.scale - 1) <= 0.001 && Math.abs(state.scaleV) <= 0.001;

                if (!settled) {
                    state.raf = requestAnimationFrame(bounceLoop);
                } else {
                    state.tx = 0; state.ty = 0;
                    state.vx = 0; state.vy = 0;
                    state.scale = 1; state.scaleV = 0;
                    card.style.transform = '';
                    state.phase = 'idle';
                }
            }

            /* Store loop refs for window handlers */
            state._squishLoop = squishLoop;
            state._bounceLoop = bounceLoop;

            card.addEventListener('mousedown', (e) => {
                state.isDragging = true;
                state.startX = e.clientX; state.startY = e.clientY;
                state.prevX = e.clientX; state.lastX = e.clientX;
                state.prevY = e.clientY; state.lastY = e.clientY;
                state.vx = 0; state.vy = 0; state.scaleV = 0;
                card.style.cursor = 'grabbing';
                if (state.raf) cancelAnimationFrame(state.raf);
                state.phase = 'squish';
                state.raf = requestAnimationFrame(squishLoop);
                e.preventDefault(); // prevent link navigation while dragging
            });
        });

        /* ─── Merged window-level listeners ─────────────────────────────── */
        window.addEventListener('mousemove', (e) => {
            /* Model viewer orbit tracking */
            const xPercent = (e.clientX / window.innerWidth)  - 0.5;
            const yPercent = (e.clientY / window.innerHeight) - 0.5;
            modelViewer.cameraOrbit = `${-xPercent * 80}deg ${100 - (yPercent * 30)}deg 105%`;

            /* Springy drag for whichever card is active */
            cardStates.forEach((state, card) => {
                if (!state.isDragging) return;
                state.prevX = state.lastX; state.prevY = state.lastY;
                state.lastX = e.clientX;   state.lastY = e.clientY;
                state.tx = (e.clientX - state.startX) * PHYSICS.dragResistance;
                state.ty = (e.clientY - state.startY) * PHYSICS.dragResistance;
                card.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.scale})`;
            });
        });

        window.addEventListener('mouseup', () => {
            cardStates.forEach((state, card) => {
                if (!state.isDragging) return;
                state.isDragging = false;
                card.style.cursor = 'pointer';
                state.vx = (state.lastX - state.prevX) * PHYSICS.dragResistance * 0.6;
                state.vy = (state.lastY - state.prevY) * PHYSICS.dragResistance * 0.6;
                state.scaleV = PHYSICS.scaleBounce * 1.5;
                if (state.raf) cancelAnimationFrame(state.raf);
                state.phase = 'bounce';
                state.raf = requestAnimationFrame(state._bounceLoop);
            });
        });
    </script>
</body>
</html>
