<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nether Portal Calculator</title>

<link rel="icon" type="image/png" href="favicon.png">
<meta name="description" content="Free Minecraft Nether Portal Calculator. Convert coordinates between Overworld and Nether instantly.">
<meta name="keywords" content="nether calculator, minecraft nether coordinates, nether portal calculator, overworld to nether">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ow:   #4ade80;
    --nt:   #ff4d4d; 
    --bg:   #050505;
    --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
    --glass-border: rgba(255, 255, 255, 0.12);
    --text: #f5f5f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image: 
      radial-gradient(at 0% 0%, rgba(74, 222, 128, 0.12) 0, transparent 45%), 
      radial-gradient(at 100% 100%, rgba(255, 77, 77, 0.12) 0, transparent 45%),
      url('background.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Roboto', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(35px) saturate(180%);
    -webkit-backdrop-filter: blur(35px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    border-left: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 32px;
    padding: 48px 44px;
    width: 100%;
    max-width: 680px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 1px rgba(255,255,255,0.1);
  }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { 
    font-size: 2.2rem; 
    font-weight: 700; 
    letter-spacing: -0.8px;
    background: linear-gradient(180deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 52px 1fr;
    row-gap: 20px;
  }

  .side-card {
    border-radius: 20px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: inset 0 2px 12px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .side-card.ow input::placeholder { color: rgba(74, 222, 128, 0.35); }
  .side-card.nt input::placeholder { color: rgba(255, 77, 77, 0.35); }

  .side-card.ow { border-bottom: 2px solid rgba(74, 222, 128, 0.4); }
  .side-card.nt { border-bottom: 2px solid rgba(255, 77, 77, 0.4); }

  .side-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
  }
  .side-card.ow .side-title { color: var(--ow); }
  .side-card.nt .side-title { color: var(--nt); }

  .field { display: flex; align-items: center; justify-content: space-between; }
  .field-label { font-size: 18px; font-weight: 700; width: 20px; color: rgba(255,255,255,0.4); }

  input[type="number"] {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    font-size: 22px;
    font-weight: 600;
    text-align: right;
    width: calc(100% - 28px);
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .arrow-mid { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: #444; 
    font-size: 24px; 
    user-select: none; 
  }

  /* ── GLASSMORPHISM BUTTONS ── */
  .btn-container { 
    position: relative; 
    display: flex; 
  }

  .btn {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    font-family: 'Roboto', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border: 1px solid var(--glass-border);
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    border-left: 1px solid rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    color: var(--text);
    background: var(--glass-bg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 1px rgba(255,255,255,0.1);
  }

  .btn:active { transform: scale(0.95); }

  .btn:hover {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06));
    border-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 0 1px rgba(255,255,255,0.15);
  }

  /* Swap Button - Center Column */
  .btn-swap {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    font-size: 20px;
    align-self: center;
    justify-self: center;
    transform: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .swap-icon {
    display: inline-block;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-swap:hover .swap-icon {
    transform: rotate(180deg);
  }

  .btn-swap:hover {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
  }

  .btn-swap:active {
    transform: scale(0.9);
  }

  /* Copy Button - Dynamic tinted glass matching mode */
  .btn-copy {
    position: relative;
    overflow: hidden;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  /* Nether mode: red tinted glass */
  .btn-copy.nt-mode {
    background: linear-gradient(135deg, rgba(255, 77, 77, 0.3), rgba(155, 47, 47, 0.3));
    border-bottom: 2px solid rgba(255, 77, 77, 0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(255, 77, 77, 0.08), inset 0 0 1px rgba(255,255,255,0.1);
  }

  .btn-copy.nt-mode:hover {
    background: linear-gradient(135deg, rgba(255, 77, 77, 0.6), rgba(155, 47, 47, 0.6));
    border-color: rgba(255, 77, 77, 0.6);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(255, 77, 77, 0.15), inset 0 0 1px rgba(255,255,255,0.15);
  }

  /* Overworld mode: green tinted glass */
  .btn-copy.ow-mode {
    background: linear-gradient(135deg, rgba(60, 200, 100, 0.8), rgba(60, 155, 90, 0.6));
    border-bottom: 2px solid rgba(74, 222, 128, 0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(74, 222, 128, 0.08), inset 0 0 1px rgba(255,255,255,0.1);
  }

  .btn-copy.ow-mode:hover {
    background: linear-gradient(135deg, rgba(60, 200, 100, 0.9), rgba(60, 155, 90, 0.9));
    border-color: rgba(74, 222, 128, 0.6);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(74, 222, 128, 0.15), inset 0 0 1px rgba(255,255,255,0.15);
  }

  .footer {
    text-align: left;
    margin-top: 32px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .card { padding: 32px 20px; }
    .main-grid { grid-template-columns: 1fr 36px 1fr; }
    .btn-swap { width: 36px; height: 36px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Nether Portal Calculator</h1>
  </div>

  <div class="main-grid">
    <div class="side-card ow">
      <div class="side-title">Overworld</div>
      <div class="field">
        <span class="field-label">X</span>
        <input type="number" id="ow-x" placeholder="0" oninput="calc('ow')">
      </div>
      <div class="field">
        <span class="field-label">Y</span>
        <input type="number" id="ow-y" placeholder="64" oninput="calc('ow')">
      </div>
      <div class="field">
        <span class="field-label">Z</span>
        <input type="number" id="ow-z" placeholder="0" oninput="calc('ow')">
      </div>
    </div>

    <button class="btn btn-swap" onclick="swapMode()" title="Swap direction">
      <span class="swap-icon">⇆</span>
    </button>

    <div class="side-card nt">
      <div class="side-title">Nether</div>
      <div class="field">
        <span class="field-label">X</span>
        <input type="number" id="nt-x" placeholder="0" oninput="calc('nt')">
      </div>
      <div class="field">
        <span class="field-label">Y</span>
        <input type="number" id="nt-y" placeholder="64" oninput="calc('nt')">
      </div>
      <div class="field">
        <span class="field-label">Z</span>
        <input type="number" id="nt-z" placeholder="0" oninput="calc('nt')">
      </div>
    </div>

    <button class="btn btn-reset" onclick="reset()">↺ Reset</button>
    <div></div>

    <div class="btn-container">
      <button class="btn btn-copy nt-mode" id="copy-btn" onclick="copyCoords()">📋 Copy Nether</button>
    </div>
  </div>

  <div class="footer">not affiliated with mojang studios</div>
</div>

<script>
  let copyMode = 'nt';

  function calc(source) {
    const ox = document.getElementById('ow-x'), oy = document.getElementById('ow-y'), oz = document.getElementById('ow-z');
    const nx = document.getElementById('nt-x'), ny = document.getElementById('nt-y'), nz = document.getElementById('nt-z');

    if (source === 'ow') {
      nx.value = ox.value === '' ? '' : Math.round(parseFloat(ox.value) / 8);
      ny.value = oy.value === '' ? '' : oy.value;
      nz.value = oz.value === '' ? '' : Math.round(parseFloat(oz.value) / 8);
    } else {
      ox.value = nx.value === '' ? '' : Math.round(parseFloat(nx.value) * 8);
      oy.value = ny.value === '' ? '' : ny.value;
      oz.value = nz.value === '' ? '' : Math.round(parseFloat(nz.value) * 8);
    }
  }

  function swapMode() {
    copyMode = (copyMode === 'nt') ? 'ow' : 'nt';
    updateCopyButtonUI();
  }

  function updateCopyButtonUI() {
    const btn = document.getElementById('copy-btn');
    if (copyMode === 'nt') {
      btn.textContent = '📋 Copy Nether';
      btn.classList.remove('ow-mode');
      btn.classList.add('nt-mode');
    } else {
      btn.textContent = '📋 Copy Overworld';
      btn.classList.remove('nt-mode');
      btn.classList.add('ow-mode');
    }
  }

  function copyCoords() {
    const prefix = copyMode === 'nt' ? 'nt' : 'ow';
    const label = copyMode === 'nt' ? 'Nether' : 'Overworld';

    const x = document.getElementById(`${prefix}-x`).value || 0;
    const y = document.getElementById(`${prefix}-y`).value || 64;
    const z = document.getElementById(`${prefix}-z`).value || 0;

    if (document.getElementById(`${prefix}-x`).value === '' && 
        document.getElementById(`${prefix}-z`).value === '') return;

    const text = `${label}: X: ${x}, Y: ${y}, Z: ${z}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      const originalText = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(() => {
        btn.textContent = originalText;
        updateCopyButtonUI();
      }, 1000);
    });
  }

  function reset() {
    ['ow-x', 'ow-y', 'ow-z', 'nt-x', 'nt-y', 'nt-z'].forEach(id => document.getElementById(id).value = '');
    copyMode = 'nt';
    updateCopyButtonUI();
  }
</script>
</body>
</html>
