<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net</title>
<link rel="icon" href="happy.webp" type="image/webp">
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #222222;
    --surface2: #2a2a2a;
    --border: #ffffff0d;
    --border2: #ffffff1a;
    --green: #4ade80;
    --green-dim: #4ade8018;
    --green-border: #4ade8030;
    --text: #ffffff;
    --muted: #888888;
    --muted2: #aaaaaa;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 60px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1.1rem;
    color: #ffffff;
  }

  main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .page-title {
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    color: #ffffff;
  }

  .page-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 0;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
    opacity: 0.5;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #ffffff;
    line-height: 1.2;
    white-space: normal;
    overflow: visible;
    text-overflow: unset;
    word-break: break-word;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .section-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
  }

  .section-badge {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 99px;
  }

  .chart-wrap {
    padding: 1rem 1.5rem 0.5rem;
    height: 300px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #chart-daily {
    width: 100%;
    height: 100%;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 10px 16px;
    color: var(--muted2);
    vertical-align: middle;
    white-space: nowrap;
  }

  .td-id   { font-size: 11px; color: var(--muted); }
  .td-buyer { color: #ffffff; font-weight: 500; }
  .td-revenue { color: var(--green); font-weight: 600; }
  .td-date  { font-size: 11px; color: var(--muted); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
  }

  .badge-produk {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .error-box {
    background: #ff444415;
    border: 1px solid #ff444430;
    border-radius: var(--radius);
    padding: 1rem 1.5rem;
    font-size: 12px;
    color: #ff8888;
    display: none;
    align-items: center;
    gap: 10px;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  .password-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.4s ease;
  }

  .password-overlay.pw-hidden {
    opacity: 0; pointer-events: none;
  }

  .password-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2.5rem 2rem;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }

  .pw-logo {
    width: 48px; height: 48px;
    object-fit: contain; border-radius: 8px;
    margin-bottom: 1rem;
  }

.pw-field {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 0.75rem;
    cursor: text;
  }

  .pw-slots {
    display: flex;
    gap: 10px;
  }

  .pw-slot {
    width: 44px;
    height: 48px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .pw-slot.active {
    border-color: var(--green);
    box-shadow: 0 0 0 1px var(--green-border);
  }

  .pw-hidden-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    cursor: text;
    font-size: 16px;
    caret-color: transparent;
  }

  .pw-error {
    font-size: 11px;
    color: #ff6b6b;
    min-height: 1.2em;
    transition: opacity 0.15s;
  }

  .pw-loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 14px 0;
  }

  .pw-loader .spinner {
    width: 22px;
    height: 22px;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-6px); }
    80%     { transform: translateX(6px); }
  }

  .pw-shake { animation: shake 0.3s ease; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }

    main {
      padding: 1rem;
      gap: 1rem;
    }

    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .stat-card {
      padding: 1rem;
      min-height: 80px;
    }

    .stat-value { font-size: 1.1rem; }

    .section-header { padding: 0.75rem 1rem; }
    .section-title { font-size: 0.75rem; }

    .chart-wrap { height: 220px; }

    thead th,
    tbody td { padding: 8px 10px; }

    .password-box {
      padding: 1.5rem;
      max-width: 300px;
    }
  }

  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: 1fr; }

    .chart-wrap { height: 200px; }

    .page-title { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="password-overlay" id="pwOverlay">
  <div class="password-box">
    <img src="happy.webp" alt="" class="pw-logo">
    <div class="pw-field" id="pwField">
      <div class="pw-slots">
        <span class="pw-slot active" id="slot0"></span>
        <span class="pw-slot" id="slot1"></span>
        <span class="pw-slot" id="slot2"></span>
        <span class="pw-slot" id="slot3"></span>
      </div>
      <input type="password" id="pwInput" maxlength="4" autocomplete="off" spellcheck="false" class="pw-hidden-input">
    </div>
    <div class="pw-loader" id="pwLoader">
      <div class="spinner"></div>
      <div style="font-size:11px;color:var(--muted)">Memverifikasi...</div>
    </div>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<header>
  <div class="logo">
    <img src="happy.webp" alt="logo" style="width:24px;height:24px;object-fit:contain;border-radius:4px;">
    Net
  </div>
</header>

<main>

  <div>
    <div class="page-title">Laporan Penjualan</div>
    <div class="page-sub" id="last-updated">Memuat data...</div>
  </div>

  <div class="error-box" id="error-box">
    ⚠ Gagal memuat data. Pastikan URL GAS sudah benar dan akses diset ke "Anyone".
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <div class="section-title-dot"></div>
        Revenue Harian
      </div>
      <div class="section-badge" id="daily-count">—</div>
    </div>
    <div class="chart-wrap" id="chart-wrap">
      <div class="spinner" id="chart-spinner"></div>
      <div id="chart-daily" style="display:none;width:100%;height:100%;"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">
        <div class="section-title-dot"></div>
        Daftar Order
      </div>
      <div class="section-badge" id="orders-count">—</div>
    </div>
    <div class="table-wrap">
      <div class="loading" id="orders-loading" style="padding:2rem 0">
        <div class="spinner"></div>
      </div>
      <table id="orders-table" style="display:none">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Buyer</th>
            <th>Produk</th>
            <th>Qty</th>
            <th>Harga</th>
            <th>Revenue</th>
            <th>Tanggal</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  Data diambil langsung dari Google Sheets via Google Apps Script &nbsp;·&nbsp; Net Dashboard
</footer>

<script>
  const _P1 = "https://script.google.com/macros/s/";
  const _P2 = "fycbzUL3";
  const _P3 = "fpCS5W9w_kzqXwdu6ST6ReEV";
  const _P4 = "kP8I4F-p_qjLelFl3yO9ohkVAuuerervFVkfcQ/exec";

  function buildURL(code) {
    const c = code.toUpperCase();
    return _P1 + c[0] + c[1] + _P2 + c[2] + _P3 + c[3] + _P4;
  }

  let chartInstance = null;

  // Format angka biasa: 23304 → "23.304"
  function fmt(num) {
    return Number(num).toLocaleString("id-ID");
  }

  // Format Total Terjual: 1428000000 → "$ 1.428.000.000"
  function fmtTotal(val) {
    const num = Number(val);
    if (!isNaN(num) && num > 0) {
      return `$ ${num.toLocaleString("id-ID")}`;
    }
    // Jika sudah string (misal "1387 Juta Coins"), coba extract angka
    const match = String(val).match(/[\d.]+/);
    if (match) {
      const extracted = Number(match[0].replace(/\./g, ""));
      if (!isNaN(extracted)) return `$ ${extracted.toLocaleString("id-ID")}`;
    }
    return val;
  }

  function formatTanggal(isoStr) {
    const d = new Date(isoStr);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function fmtHari(val) {
    return String(val).replace("Penjualan ", "");
  }

  function fmtTanggalLabel(isoStr) {
    const d = new Date(isoStr);
    return d.toLocaleDateString("id-ID", {
      day: "2-digit", month: "short", year: "numeric"
    });
  }

  function showError() {
    document.getElementById("error-box").style.display = "flex";
  }

  async function renderSummary(summary) {
    const grid = document.getElementById("stats-grid");

    const cards = [
      {
        label: "Profit",
        value: summary.profit ? `Rp ${fmt(Math.round(summary.profit))}` : "—"
      },
      {
        label: "Avg Price",
        value: summary.avg_price ? `Rp ${fmt(Math.round(summary.avg_price))}` : "—"
      },
      {
        label: "Total Terjual",
        value: fmtTotal(summary.total_sold || "—")
      },
      {
        label: "Toko Berjalan",
        value: summary.hari_toko_berjalan || "—"
      },
      {
        label: "Hari Penjualan",
        value: summary.hari_ada_penjualan ? fmtHari(summary.hari_ada_penjualan) : "—"
      }
    ];

    grid.innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value">${c.value}</div>
      </div>
    `).join("");
  }

  async function renderDaily(dailyReports) {
    document.getElementById("daily-count").textContent = `${dailyReports.length} hari`;

    const labels = dailyReports.map(d => {
      const dt = new Date(d.tanggal_penjualan);
      const pad = n => String(n).padStart(2, '0');
      return isNaN(dt.getTime())
        ? d.tanggal_penjualan
        : `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
    });
    const fullLabels = dailyReports.map(d => fmtTanggalLabel(d.tanggal_penjualan));
    const values = dailyReports.map(d => Number(d.total_revenue_harian));

    if (chartInstance) chartInstance.dispose();

    const el = document.getElementById("chart-daily");
    document.getElementById("chart-spinner").style.display = "none";
    el.style.display = "block";

    chartInstance = echarts.init(el, null, { renderer: "canvas" });

    // Default: show last 30 bars (or all if fewer)
    const total = dailyReports.length;
    const startPct = total > 30 ? Math.round((total - 30) / total * 100) : 0;

    chartInstance.setOption({
      backgroundColor: "transparent",
      grid: { top: 16, right: 20, bottom: 60, left: 80 },
      xAxis: {
        type: "category",
        data: labels,
        axisLine: { lineStyle: { color: "#ffffff0d" } },
        axisTick: { show: false },
        axisLabel: {
          color: "#888888",
          fontFamily: "'Plus Jakarta Sans', sans-serif",
          fontSize: 10,
          rotate: 0,
          interval: "auto",
          hideOverlap: true
        },
        splitLine: { show: false }
      },
      yAxis: {
        type: "value",
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          color: "#888888",
          fontFamily: "'Plus Jakarta Sans', sans-serif",
          fontSize: 10,
          formatter: v => `Rp ${fmt(v)}`
        },
        splitLine: { lineStyle: { color: "#ffffff08" } }
      },
      dataZoom: [
        {
          type: "slider",
          start: startPct,
          end: 100,
          height: 24,
          bottom: 10,
          borderColor: "#ffffff0d",
          backgroundColor: "#2a2a2a",
          fillerColor: "#4ade8018",
          handleStyle: { color: "#4ade80", borderColor: "#4ade80" },
          moveHandleStyle: { color: "#4ade8060" },
          selectedDataBackground: {
            lineStyle: { color: "#4ade80" },
            areaStyle: { color: "#4ade8020" }
          },
          dataBackground: {
            lineStyle: { color: "#ffffff15" },
            areaStyle: { color: "#ffffff08" }
          },
          textStyle: { color: "#888888", fontSize: 9 },
          brushSelect: false
        },
        {
          type: "inside",
          start: startPct,
          end: 100,
          zoomOnMouseWheel: true,
          moveOnMouseMove: true
        }
      ],
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "shadow", shadowStyle: { color: "#ffffff06" } },
        backgroundColor: "#2a2a2a",
        borderColor: "#ffffff15",
        borderWidth: 1,
        textStyle: { color: "#ffffff", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12 },
        formatter: params => {
          const i = params[0].dataIndex;
          return `<span style="color:#888;font-size:11px">${fullLabels[i]}</span><br/>Rp ${fmt(params[0].value)}`;
        }
      },
      series: [{
        type: "bar",
        data: values,
        itemStyle: {
          color: "#4ade8030",
          borderColor: "#4ade80",
          borderWidth: 1.5,
          borderRadius: [4, 4, 0, 0]
        },
        emphasis: {
          itemStyle: { color: "#4ade8060" }
        },
        barMaxWidth: 40
      }]
    });

    window.addEventListener("resize", () => chartInstance && chartInstance.resize());
  }

  async function renderOrders(transactions) {
    document.getElementById("orders-count").textContent = `${transactions.length} transaksi`;

    const tbody = document.getElementById("orders-body");
    tbody.innerHTML = transactions.map(tx => {
      const shortId = tx.order_id.toString().replace(/^OD0000001/, '');
      return `
      <tr>
        <td class="td-id">${shortId}</td>
        <td class="td-buyer">${tx.buyer || "—"}</td>
        <td><span class="badge badge-produk">${tx.product || "—"}</span></td>
        <td>${tx.quantity || "—"}</td>
        <td>Rp ${fmt(tx.price)}</td>
        <td class="td-revenue">Rp ${fmt(tx.final_revenue)}</td>
        <td class="td-date">${formatTanggal(tx.transaction_time)}</td>
      </tr>
    `}).join("");

    document.getElementById("orders-loading").style.display = "none";
    document.getElementById("orders-table").style.display  = "table";
  }

  function setTimestamp() {
    const now = new Date().toLocaleString("id-ID", {
      day: "2-digit", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    document.getElementById("last-updated").textContent = `Terakhir diperbarui: ${now}`;
  }

  async function loadAll(data) {
    try {
      await Promise.all([
        renderSummary(data.summary),
        renderDaily(data.daily_reports),
        renderOrders(data.transactions)
      ]);
      setTimestamp();
    } catch (err) {
      console.error(err);
      showError();
    }
  }

  const pwInput = document.getElementById("pwInput");
  const pwOverlay = document.getElementById("pwOverlay");
  const pwError = document.getElementById("pwError");
  const pwSlots = document.querySelectorAll(".pw-slot");
  const pwSlotsWrap = document.querySelector(".pw-slots");
  const pwLoader = document.getElementById("pwLoader");
  const pwField = document.getElementById("pwField");

  function syncSlots() {
    const val = pwInput.value;
    pwSlots.forEach((slot, i) => {
      slot.textContent = i < val.length ? "•" : "";
      slot.classList.toggle("active", i === val.length);
    });
  }

  pwField.addEventListener("click", () => pwInput.focus());

  pwInput.addEventListener("input", async function() {
    pwError.textContent = "";
    pwField.classList.remove("pw-shake");
    syncSlots();
    if (this.value.length !== 4) return;

    this.disabled = true;
    pwSlotsWrap.style.display = "none";
    pwLoader.style.display = "flex";

    try {
      const url = buildURL(this.value);

      const res = await fetch(url, { redirect: "follow" });
      if (!res.ok) throw null;

      const data = await res.json();
      if (!data || typeof data !== "object" || !("summary" in data)) throw null;

      pwOverlay.classList.add("pw-hidden");
      loadAll(data);
    } catch {
      pwLoader.style.display = "none";
      pwSlotsWrap.style.display = "flex";
      pwError.textContent = "Kode akses tidak valid";
      this.value = "";
      this.disabled = false;
      pwSlots.forEach(s => { s.textContent = ""; s.classList.remove("active"); });
      pwSlots[0].classList.add("active");
      pwField.classList.add("pw-shake");
      this.focus();
    }
  });

  pwInput.focus();
  syncSlots();
</script>
</body>
</html>
